<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>File Transfer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #0f1535 0%, #0a0e27 100%);
            border-bottom: 1px solid #1e2a4a;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Cards */
        .card {
            background: #0f1535;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #1e2a4a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #4f9eff;
        }

        /* Input groups */
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4f9eff;
            box-shadow: 0 0 0 2px rgba(79, 158, 255, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            background: #1e2a4a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 158, 255, 0.3);
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #10b981;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Status messages */
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .status-info {
            background: #1e2a4a;
            color: #4f9eff;
            border-left: 3px solid #4f9eff;
        }

        .status-success {
            background: #064e3b;
            color: #10b981;
            border-left: 3px solid #10b981;
        }

        .status-error {
            background: #7f1d1d;
            color: #f87171;
            border-left: 3px solid #dc2626;
        }

        /* File drop zone */
        .drop-zone {
            border: 2px dashed #1e2a4a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #0a0e27;
            transition: all 0.3s;
            cursor: pointer;
        }

        .drop-zone.drag-over {
            border-color: #4f9eff;
            background: #0f1535;
        }

        .drop-zone p {
            color: #6b7280;
            margin-top: 12px;
        }

        /* File list */
        .file-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .file-item {
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .file-size {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: #1e2a4a;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f9eff, #7c3aed);
            transition: width 0.3s;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .file-actions button {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        /* Room info */
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .room-key {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: bold;
            background: #0a0e27;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #4f9eff;
            color: #4f9eff;
        }

        .peer-count {
            background: #1e2a4a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e2a4a;
        }

        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab.active {
            color: #4f9eff;
            border-bottom: 2px solid #4f9eff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Queue */
        .queue-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: #0a0e27;
            border-radius: 6px;
            margin-bottom: 6px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            
            .file-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .progress-bar {
                width: 100%;
            }
            
            .room-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FILE TRANSFER HUB</h1>
    </div>

    <div class="container">
        <!-- Connection Panel -->
        <div id="connectionPanel" class="card">
            <h2>Connect to Room</h2>
            <div class="input-group">
                <input type="text" id="roomKeyInput" placeholder="Enter room key" maxlength="20">
                <button id="connectBtn" class="btn btn-primary">Join / Create</button>
            </div>
            <div id="connectionStatus"></div>
        </div>

        <!-- Main Interface (shown after connection) -->
        <div id="mainInterface" style="display: none;">
            <div class="card">
                <div class="room-header">
                    <div>
                        <div style="font-size: 0.85rem; color: #6b7280;">Room Key</div>
                        <div class="room-key" id="currentRoomKey"></div>
                    </div>
                    <div class="peer-count" id="peerCount">Devices: 1</div>
                    <button id="leaveRoomBtn" class="btn btn-danger">Leave Room</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="send">Send Files</button>
                <button class="tab" data-tab="received">Received Files</button>
            </div>

            <!-- Send Tab -->
            <div id="sendTab" class="tab-content active">
                <div class="card">
                    <h2>Drop Files Here or Click to Select</h2>
                    <div id="dropZone" class="drop-zone">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3v12m0 0-3-3m3 3 3-3M5 17h14a2 2 0 0 1 2 2v2H3v-2a2 2 0 0 1 2-2z"/>
                        </svg>
                        <p>Drag & drop files here or click to browse</p>
                    </div>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <div class="card">
                    <h2>Upload Queue</h2>
                    <div id="uploadQueue" class="file-list">
                        <div style="text-align: center; color: #6b7280; padding: 20px;">No files in queue</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Available Files from Peers</h2>
                    <div id="availableFiles" class="file-list">
                        <div style="text-align: center; color: #6b7280; padding: 20px;">No shared files</div>
                    </div>
                </div>
            </div>

            <!-- Received Tab -->
            <div id="receivedTab" class="tab-content">
                <div class="card">
                    <h2>Downloaded Files</h2>
                    <div id="receivedFiles" class="file-list">
                        <div style="text-align: center; color: #6b7280; padding: 20px;">No files downloaded yet</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.min.js"></script>
    <script>
        let socket = null;
        let currentRoomKey = null;
        let uploadQueue = [];
        let activeUploads = new Map();
        let availableFiles = new Map();
        let receivedFiles = [];
        let peerConnections = new Map();

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const roomKeyInput = document.getElementById('roomKeyInput');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionPanel = document.getElementById('connectionPanel');
        const mainInterface = document.getElementById('mainInterface');
        const currentRoomKeyEl = document.getElementById('currentRoomKey');
        const peerCountEl = document.getElementById('peerCount');
        const leaveRoomBtn = document.getElementById('leaveRoomBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadQueueDiv = document.getElementById('uploadQueue');
        const availableFilesDiv = document.getElementById('availableFiles');
        const receivedFilesDiv = document.getElementById('receivedFiles');

        // Initialize socket connection
        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Socket connected');
            });

            socket.on('peer-joined', (data) => {
                updatePeerCount(data.clientsCount);
                addSystemMessage(`Device joined the room`, 'info');
            });

            socket.on('peer-left', (data) => {
                updatePeerCount(data.clientsCount);
                addSystemMessage(`Device left the room`, 'info');
            });

            socket.on('file-metadata', (data) => {
                availableFiles.set(data.fileId, {
                    ...data,
                    status: 'available'
                });
                renderAvailableFiles();
                addSystemMessage(`New file available: ${data.fileName}`, 'success');
            });

            socket.on('file-chunk', (data) => {
                receiveFileChunk(data);
            });

            socket.on('file-request', (data) => {
                handleFileRequest(data);
            });
        }

        // Connect to room
        function connectToRoom() {
            const roomKey = roomKeyInput.value.trim();
            if (!roomKey) {
                showStatus('Please enter a room key', 'error');
                return;
            }

            if (!socket) {
                initSocket();
                setTimeout(() => performJoin(roomKey), 500);
            } else {
                performJoin(roomKey);
            }
        }

        function performJoin(roomKey) {
            showStatus('Connecting to room...', 'info');
            
            socket.emit('join-room', roomKey, (response) => {
                if (response.success) {
                    currentRoomKey = roomKey;
                    currentRoomKeyEl.textContent = roomKey;
                    updatePeerCount(response.clientsCount);
                    
                    connectionPanel.style.display = 'none';
                    mainInterface.style.display = 'block';
                    
                    showStatus(`Connected to room: ${roomKey}`, 'success');
                    addSystemMessage(`You joined the room as ${response.isCreator ? 'creator' : 'peer'}`, 'success');
                    
                    setupFileTransfer();
                } else {
                    showStatus('Failed to connect to room', 'error');
                }
            });
        }

        // Leave room
        leaveRoomBtn.onclick = () => {
            if (socket && currentRoomKey) {
                socket.emit('leave-room');
                socket.disconnect();
                socket = null;
                currentRoomKey = null;
                uploadQueue = [];
                activeUploads.clear();
                availableFiles.clear();
                receivedFiles = [];
                
                connectionPanel.style.display = 'block';
                mainInterface.style.display = 'none';
                roomKeyInput.value = '';
                
                showStatus('Left the room', 'info');
                initSocket();
            }
        };

        // Setup file transfer handlers
        function setupFileTransfer() {
            // Drop zone handlers
            dropZone.onclick = () => fileInput.click();
            
            dropZone.ondragover = (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            };
            
            dropZone.ondragleave = () => {
                dropZone.classList.remove('drag-over');
            };
            
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const files = Array.from(e.dataTransfer.files);
                addFilesToQueue(files);
            };
            
            fileInput.onchange = (e) => {
                const files = Array.from(e.target.files);
                addFilesToQueue(files);
                fileInput.value = '';
            };
        }

        // Add files to upload queue
        function addFilesToQueue(files) {
            for (let file of files) {
                const fileId = generateFileId();
                uploadQueue.push({
                    id: fileId,
                    file: file,
                    status: 'pending',
                    progress: 0
                });
                
                // Announce file to all peers
                socket.emit('file-metadata', {
                    fileId: fileId,
                    fileName: file.name,
                    fileSize: file.size,
                    fileType: file.type
                });
            }
            renderUploadQueue();
            processQueue();
        }

        // Process upload queue
        async function processQueue() {
            for (let item of uploadQueue) {
                if (item.status === 'pending') {
                    await uploadFile(item);
                }
            }
        }

        // Upload file to all peers
        async function uploadFile(queueItem) {
            queueItem.status = 'uploading';
            renderUploadQueue();
            
            const file = queueItem.file;
            const chunkSize = 16384;
            let offset = 0;
            
            while (offset < file.size) {
                const chunk = file.slice(offset, offset + chunkSize);
                const arrayBuffer = await readFileChunk(chunk);
                
                socket.emit('file-chunk', {
                    fileId: queueItem.id,
                    chunk: arrayBuffer,
                    offset: offset,
                    isLast: offset + chunkSize >= file.size
                });
                
                offset += chunkSize;
                queueItem.progress = (offset / file.size) * 100;
                renderUploadQueue();
                
                // Small delay to prevent flooding
                await new Promise(resolve => setTimeout(resolve, 10));
            }
            
            queueItem.status = 'completed';
            renderUploadQueue();
            addSystemMessage(`Upload complete: ${file.name}`, 'success');
        }

        // Read file chunk as ArrayBuffer
        function readFileChunk(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(blob);
            });
        }

        // Receive file chunk
        let receivingFiles = new Map();
        
        function receiveFileChunk(data) {
            if (!receivingFiles.has(data.fileId)) {
                receivingFiles.set(data.fileId, {
                    chunks: [],
                    size: 0,
                    fileName: null
                });
            }
            
            const fileData = receivingFiles.get(data.fileId);
            fileData.chunks.push(data.chunk);
            
            if (data.isLast) {
                // Find file name from available files
                const fileInfo = availableFiles.get(data.fileId);
                if (fileInfo) {
                    fileData.fileName = fileInfo.fileName;
                }
                
                // Assemble file
                const blob = new Blob(fileData.chunks);
                const url = URL.createObjectURL(blob);
                
                receivedFiles.push({
                    id: data.fileId,
                    name: fileData.fileName || `file_${data.fileId}`,
                    url: url,
                    size: blob.size
                });
                
                renderReceivedFiles();
                receivingFiles.delete(data.fileId);
                addSystemMessage(`File received: ${fileData.fileName}`, 'success');
            }
        }

        // Handle file request from peer
        function handleFileRequest(data) {
            const queueItem = uploadQueue.find(item => item.id === data.fileId);
            if (queueItem && queueItem.file) {
                uploadFile(queueItem);
            }
        }

        // Request file from peer
        function requestFile(fileId, peerId) {
            socket.emit('request-file', {
                fileId: fileId,
                peerId: peerId
            });
        }

        // Render functions
        function renderUploadQueue() {
            if (uploadQueue.length === 0) {
                uploadQueueDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No files in queue</div>';
                return;
            }
            
            uploadQueueDiv.innerHTML = uploadQueue.map(item => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(item.file.name)}</div>
                        <div class="file-size">${formatBytes(item.file.size)}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${item.progress}%"></div>
                        </div>
                    </div>
                    <div class="file-actions">
                        <span style="font-size: 0.85rem; color: #6b7280;">
                            ${item.status === 'pending' ? 'Pending' : item.status === 'uploading' ? `${Math.round(item.progress)}%` : 'Complete'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function renderAvailableFiles() {
            const files = Array.from(availableFiles.values());
            if (files.length === 0) {
                availableFilesDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No shared files</div>';
                return;
            }
            
            availableFilesDiv.innerHTML = files.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.fileName)}</div>
                        <div class="file-size">${formatBytes(file.fileSize)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-primary" onclick="requestFile('${file.fileId}', '${file.senderId}')">Download</button>
                    </div>
                </div>
            `).join('');
        }

        function renderReceivedFiles() {
            if (receivedFiles.length === 0) {
                receivedFilesDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No files downloaded yet</div>';
                return;
            }
            
            receivedFilesDiv.innerHTML = receivedFiles.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-size">${formatBytes(file.size)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-success" onclick="downloadFile('${file.url}', '${escapeHtml(file.name)}')">Save</button>
                    </div>
                </div>
            `).join('');
        }

        function updatePeerCount(count) {
            peerCountEl.textContent = `Devices: ${count}`;
        }

        function showStatus(message, type) {
            const statusDiv = connectionStatus;
            statusDiv.className = `status status-${type}`;
            statusDiv.innerHTML = message;
            setTimeout(() => {
                if (statusDiv.innerHTML === message) {
                    statusDiv.innerHTML = '';
                }
            }, 3000);
        }

        function addSystemMessage(message, type) {
            console.log(`[${type}] ${message}`);
        }

        // Utility functions
        function generateFileId() {
            return `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.downloadFile = (url, filename) => {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.requestFile = (fileId, peerId) => {
            requestFile(fileId, peerId);
        };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
            };
        });

        // Event listeners
        connectBtn.onclick = connectToRoom;
        roomKeyInput.onkeypress = (e) => {
            if (e.key === 'Enter') connectToRoom();
        };

        // Initialize socket on page load
        initSocket();
    </script>
</body>
</html>
