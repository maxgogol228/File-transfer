<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>File Transfer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #0f1535 0%, #0a0e27 100%);
            border-bottom: 1px solid #1e2a4a;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .card {
            background: #0f1535;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #1e2a4a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #4f9eff;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4f9eff;
            box-shadow: 0 0 0 2px rgba(79, 158, 255, 0.1);
        }

        .btn {
            padding: 12px 24px;
            background: #1e2a4a;
            border: none;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f9eff, #7c3aed);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 158, 255, 0.3);
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        .status-info {
            background: #1e2a4a;
            color: #4f9eff;
            border-left: 3px solid #4f9eff;
        }

        .status-success {
            background: #064e3b;
            color: #10b981;
            border-left: 3px solid #10b981;
        }

        .status-error {
            background: #7f1d1d;
            color: #f87171;
            border-left: 3px solid #dc2626;
        }

        .drop-zone {
            border: 2px dashed #1e2a4a;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #0a0e27;
            transition: all 0.3s;
            cursor: pointer;
        }

        .drop-zone.drag-over {
            border-color: #4f9eff;
            background: #0f1535;
        }

        .drop-zone p {
            color: #6b7280;
            margin-top: 12px;
        }

        .file-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .file-item {
            background: #0a0e27;
            border: 1px solid #1e2a4a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .file-info {
            margin-bottom: 8px;
        }

        .file-name {
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .file-size {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1e2a4a;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f9eff, #7c3aed);
            transition: width 0.3s ease;
            width: 0%;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .room-key {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: bold;
            background: #0a0e27;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #4f9eff;
            color: #4f9eff;
        }

        .peer-count {
            background: #1e2a4a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e2a4a;
        }

        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab.active {
            color: #4f9eff;
            border-bottom: 2px solid #4f9eff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .upload-status {
            font-size: 0.85rem;
            color: #10b981;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            
            .room-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .tab {
                padding: 8px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FILE TRANSFER HUB</h1>
    </div>

    <div class="container">
        <div id="connectionPanel" class="card">
            <h2>Connect to Room</h2>
            <div class="input-group">
                <input type="text" id="roomKeyInput" placeholder="Enter room key" maxlength="20">
                <button id="connectBtn" class="btn btn-primary">Join / Create</button>
            </div>
            <div id="connectionStatus"></div>
        </div>

        <div id="mainInterface" style="display: none;">
            <div class="card">
                <div class="room-header">
                    <div>
                        <div style="font-size: 0.85rem; color: #6b7280;">Room Key</div>
                        <div class="room-key" id="currentRoomKey"></div>
                    </div>
                    <div class="peer-count" id="peerCount">Devices: 1</div>
                    <button id="leaveRoomBtn" class="btn btn-danger">Leave Room</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="send">Send Files</button>
                <button class="tab" data-tab="received">Received Files</button>
            </div>

            <div id="sendTab" class="tab-content active">
                <div class="card">
                    <h2>Drop Files Here or Click to Select</h2>
                    <div id="dropZone" class="drop-zone">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3v12m0 0-3-3m3 3 3-3M5 17h14a2 2 0 0 1 2 2v2H3v-2a2 2 0 0 1 2-2z"/>
                        </svg>
                        <p>Drag & drop files here or click to browse</p>
                    </div>
                    <input type="file" id="fileInput" multiple style="display: none;">
                </div>

                <div class="card">
                    <h2>My Uploads</h2>
                    <div id="uploadsList" class="file-list">
                        <div style="text-align: center; color: #6b7280; padding: 20px;">No uploads</div>
                    </div>
                </div>

                <div class="card">
                    <h2>Available Files in Room</h2>
                    <div id="availableFiles" class="file-list">
                        <div style="text-align: center; color: #6b7280; padding: 20px;">No shared files</div>
                    </div>
                </div>
            </div>

            <div id="receivedTab" class="tab-content">
                <div class="card">
                    <h2>Downloaded Files</h2>
                    <div id="receivedFiles" class="file-list">
                        <div style="text-align: center; color: #6b7280; padding: 20px;">No files downloaded yet</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.min.js"></script>
    <script>
        let socket = null;
        let currentRoomKey = null;
        let myUploads = new Map(); // fileId -> { file, progress, status }
        let roomFiles = new Map(); // fileId -> metadata
        let downloadedFiles = []; // array of { id, name, url, size }
        let uploadChunkSize = 16384; // 16KB chunks

        // DOM elements
        const connectBtn = document.getElementById('connectBtn');
        const roomKeyInput = document.getElementById('roomKeyInput');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionPanel = document.getElementById('connectionPanel');
        const mainInterface = document.getElementById('mainInterface');
        const currentRoomKeyEl = document.getElementById('currentRoomKey');
        const peerCountEl = document.getElementById('peerCount');
        const leaveRoomBtn = document.getElementById('leaveRoomBtn');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadsList = document.getElementById('uploadsList');
        const availableFilesDiv = document.getElementById('availableFiles');
        const receivedFilesDiv = document.getElementById('receivedFiles');

        function initSocket() {
            socket = io();
            
            socket.on('connect', () => {
                console.log('Socket connected');
            });

            socket.on('peer-joined', (data) => {
                updatePeerCount(data.clientsCount);
                addSystemMessage('Device joined the room', 'info');
            });

            socket.on('peer-left', (data) => {
                updatePeerCount(data.clientsCount);
                addSystemMessage('Device left the room', 'info');
            });

            socket.on('file-available', (data) => {
                roomFiles.set(data.fileId, data);
                renderAvailableFiles();
                addSystemMessage(`New file available: ${data.fileName}`, 'success');
            });

            socket.on('upload-progress', (data) => {
                if (myUploads.has(data.fileId)) {
                    const upload = myUploads.get(data.fileId);
                    upload.progress = data.progress;
                    if (data.isComplete) {
                        upload.status = 'complete';
                    }
                    renderUploadsList();
                }
            });
        }

        function connectToRoom() {
            const roomKey = roomKeyInput.value.trim();
            if (!roomKey) {
                showStatus('Please enter a room key', 'error');
                return;
            }

            if (!socket) {
                initSocket();
                setTimeout(() => performJoin(roomKey), 500);
            } else {
                performJoin(roomKey);
            }
        }

        function performJoin(roomKey) {
            showStatus('Connecting to room...', 'info');
            
            socket.emit('join-room', roomKey, (response) => {
                if (response.success) {
                    currentRoomKey = roomKey;
                    currentRoomKeyEl.textContent = roomKey;
                    updatePeerCount(response.clientsCount);
                    
                    // Load existing files
                    if (response.files && response.files.length > 0) {
                        response.files.forEach(file => {
                            roomFiles.set(file.fileId, file);
                        });
                        renderAvailableFiles();
                    }
                    
                    connectionPanel.style.display = 'none';
                    mainInterface.style.display = 'block';
                    
                    showStatus(`Connected to room: ${roomKey}`, 'success');
                    addSystemMessage(`You joined the room`, 'success');
                    
                    setupFileTransfer();
                } else {
                    showStatus('Failed to connect to room', 'error');
                }
            });
        }

        leaveRoomBtn.onclick = () => {
            if (socket && currentRoomKey) {
                socket.emit('leave-room');
                socket.disconnect();
                socket = null;
                currentRoomKey = null;
                myUploads.clear();
                roomFiles.clear();
                downloadedFiles = [];
                
                connectionPanel.style.display = 'block';
                mainInterface.style.display = 'none';
                roomKeyInput.value = '';
                
                showStatus('Left the room', 'info');
                initSocket();
            }
        };

        function setupFileTransfer() {
            dropZone.onclick = () => fileInput.click();
            
            dropZone.ondragover = (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            };
            
            dropZone.ondragleave = () => {
                dropZone.classList.remove('drag-over');
            };
            
            dropZone.ondrop = (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                const files = Array.from(e.dataTransfer.files);
                uploadFiles(files);
            };
            
            fileInput.onchange = (e) => {
                const files = Array.from(e.target.files);
                uploadFiles(files);
                fileInput.value = '';
            };
        }

        async function uploadFiles(files) {
            for (let file of files) {
                const fileId = generateFileId();
                
                myUploads.set(fileId, {
                    id: fileId,
                    file: file,
                    progress: 0,
                    status: 'uploading'
                });
                renderUploadsList();
                
                await uploadFileChunks(fileId, file);
            }
        }

        async function uploadFileChunks(fileId, file) {
            const totalChunks = Math.ceil(file.size / uploadChunkSize);
            
            for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                const start = chunkIndex * uploadChunkSize;
                const end = Math.min(start + uploadChunkSize, file.size);
                const chunk = file.slice(start, end);
                
                const arrayBuffer = await readChunk(chunk);
                
                socket.emit('upload-chunk', {
                    fileId: fileId,
                    fileName: file.name,
                    fileSize: file.size,
                    fileType: file.type,
                    chunk: arrayBuffer,
                    chunkIndex: chunkIndex,
                    totalChunks: totalChunks
                });
                
                // Update progress locally
                const progress = ((chunkIndex + 1) / totalChunks) * 100;
                const upload = myUploads.get(fileId);
                if (upload) {
                    upload.progress = progress;
                    renderUploadsList();
                }
                
                // Small delay to prevent flooding
                await new Promise(resolve => setTimeout(resolve, 5));
            }
        }

        function readChunk(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(blob);
            });
        }

        function downloadFile(fileId, fileName) {
            showStatus(`Downloading ${fileName}...`, 'info');
            
            socket.emit('download-file', { fileId: fileId }, (response) => {
                if (response.success) {
                    // Convert base64 to blob
                    const binaryString = atob(response.fileData);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    const blob = new Blob([bytes]);
                    const url = URL.createObjectURL(blob);
                    
                    downloadedFiles.push({
                        id: fileId,
                        name: response.fileName,
                        url: url,
                        size: response.fileSize
                    });
                    
                    renderReceivedFiles();
                    showStatus(`Download complete: ${response.fileName}`, 'success');
                    
                    // Trigger download automatically
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = response.fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    showStatus(`Download failed: ${response.error}`, 'error');
                }
            });
        }

        function renderUploadsList() {
            if (myUploads.size === 0) {
                uploadsList.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No uploads</div>';
                return;
            }
            
            uploadsList.innerHTML = Array.from(myUploads.values()).map(upload => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(upload.file.name)}</div>
                        <div class="file-size">${formatBytes(upload.file.size)}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${upload.progress}%"></div>
                        </div>
                        <div class="upload-status">
                            ${upload.status === 'uploading' ? `Uploading: ${Math.round(upload.progress)}%` : 'Upload complete'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAvailableFiles() {
            const files = Array.from(roomFiles.values());
            if (files.length === 0) {
                availableFilesDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No shared files</div>';
                return;
            }
            
            availableFilesDiv.innerHTML = files.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.fileName)}</div>
                        <div class="file-size">${formatBytes(file.fileSize)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-primary btn-sm" onclick="window.downloadFileById('${file.fileId}', '${escapeHtml(file.fileName)}')">
                            Download
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderReceivedFiles() {
            if (downloadedFiles.length === 0) {
                receivedFilesDiv.innerHTML = '<div style="text-align: center; color: #6b7280; padding: 20px;">No files downloaded yet</div>';
                return;
            }
            
            receivedFilesDiv.innerHTML = downloadedFiles.map(file => `
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(file.name)}</div>
                        <div class="file-size">${formatBytes(file.size)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn btn-success btn-sm" onclick="window.saveFile('${file.url}', '${escapeHtml(file.name)}')">
                            Save Again
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function updatePeerCount(count) {
            peerCountEl.textContent = `Devices: ${count}`;
        }

        function showStatus(message, type) {
            const statusDiv = connectionStatus;
            statusDiv.className = `status status-${type}`;
            statusDiv.innerHTML = message;
            setTimeout(() => {
                if (statusDiv.innerHTML === message) {
                    statusDiv.innerHTML = '';
                }
            }, 3000);
        }

        function addSystemMessage(message, type) {
            console.log(`[${type}] ${message}`);
        }

        function generateFileId() {
            return `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.downloadFileById = (fileId, fileName) => {
            downloadFile(fileId, fileName);
        };

        window.saveFile = (url, filename) => {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
            };
        });

        connectBtn.onclick = connectToRoom;
        roomKeyInput.onkeypress = (e) => {
            if (e.key === 'Enter') connectToRoom();
        };

        initSocket();
    </script>
</body>
</html>
